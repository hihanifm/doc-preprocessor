# Port convention (BASE_PORT = 5000), host.docker.internal — see refs/docker-lab-guidelines.md
#   prod  →  5000   (single origin)
#   dev   →  35050 host → 5000 in container (lab: avoid busy low ports)
#
# Dev and prod can run simultaneously without port collisions.
# Optional: export COMPOSE_PROJECT_NAME=doc-preprocessor on shared hosts to isolate networks/volumes.

# Both casings are accepted (tools like curl/libcurl prefer lowercase). Cross-fallback so users
# who export only one casing still get the other.
x-proxy-args: &proxy-args
  HTTP_PROXY: ${HTTP_PROXY:-${http_proxy:-}}
  HTTPS_PROXY: ${HTTPS_PROXY:-${https_proxy:-}}
  # Broaden defaults so local/registry traffic is less likely to be forced through a bad proxy.
  NO_PROXY: ${NO_PROXY:-${no_proxy:-localhost,127.0.0.1,::1,127.0.0.0/8,host.docker.internal}}
  http_proxy: ${http_proxy:-${HTTP_PROXY:-}}
  https_proxy: ${https_proxy:-${HTTPS_PROXY:-}}
  no_proxy: ${no_proxy:-${NO_PROXY:-localhost,127.0.0.1,::1,127.0.0.0/8,host.docker.internal}}

# Runtime proxy for Flask → outbound HTTP (LLM APIs, etc.). Override PYTHON_IMAGE if Docker Hub is blocked.
x-proxy-env: &proxy-env
  HTTP_PROXY: ${HTTP_PROXY:-${http_proxy:-}}
  HTTPS_PROXY: ${HTTPS_PROXY:-${https_proxy:-}}
  NO_PROXY: ${NO_PROXY:-${no_proxy:-localhost,127.0.0.1,::1,127.0.0.0/8,host.docker.internal}}
  http_proxy: ${http_proxy:-${HTTP_PROXY:-}}
  https_proxy: ${https_proxy:-${HTTPS_PROXY:-}}
  no_proxy: ${no_proxy:-${NO_PROXY:-localhost,127.0.0.1,::1,127.0.0.0/8,host.docker.internal}}

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      <<: *proxy-args
      PYTHON_IMAGE: ${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.12-slim}
  # Linux: resolve host.docker.internal to the host (matches Docker Desktop; needed for LLM proxy/Ollama on host).
  extra_hosts:
    - "host.docker.internal:host-gateway"
  # Optional — compose fails if env_file is missing unless required: false (Compose v2.24+).
  env_file:
    - path: .env
      required: false
  volumes:
    - ./data:/data
  restart: unless-stopped

services:

  # ── Production ─────────────────────────────────────────────────────────────
  app-prod:
    <<: *common
    profiles: ["prod"]
    ports:
      - "5000:5000"
    environment:
      <<: *proxy-env
    command: ["gunicorn", "-w", "2", "-b", "0.0.0.0:5000", "--timeout", "120", "app:app"]

  # ── Development (Flask dev server, live reload) ────────────────────────────
  app-dev:
    <<: *common
    profiles: ["dev"]
    ports:
      - "35050:5000"
    environment:
      <<: *proxy-env
      FLASK_DEBUG: "1"
    command: ["python", "-m", "flask", "--app", "app", "run", "--host", "0.0.0.0", "--port", "5000"]
    volumes:
      - ./data:/data
      - .:/app          # mount source for live reload
