# Port convention (BASE_PORT = 5000) — see refs/docker-lab-guidelines.md
#   prod  →  5000   (single origin)
#   dev   →  5001   (Flask dev server with reload)
#
# Dev and prod can run simultaneously without port collisions.
# Optional: export COMPOSE_PROJECT_NAME=doc-preprocessor on shared hosts to isolate networks/volumes.

x-proxy-args: &proxy-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  # Broaden defaults so local/registry traffic is less likely to be forced through a bad proxy.
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1,127.0.0.0/8}

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
    args:
      <<: *proxy-args
  env_file: .env
  volumes:
    - ./data:/data
  restart: unless-stopped

services:

  # ── Production ─────────────────────────────────────────────────────────────
  app-prod:
    <<: *common
    profiles: ["prod"]
    ports:
      - "5000:5000"
    command: ["gunicorn", "-w", "2", "-b", "0.0.0.0:5000", "--timeout", "120", "app:app"]

  # ── Development (Flask dev server, live reload) ────────────────────────────
  app-dev:
    <<: *common
    profiles: ["dev"]
    ports:
      - "5001:5000"
    environment:
      FLASK_DEBUG: "1"
    command: ["python", "-m", "flask", "--app", "app", "run", "--host", "0.0.0.0", "--port", "5000"]
    volumes:
      - ./data:/data
      - .:/app          # mount source for live reload
